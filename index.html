<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkDash — Gerenciador de Atividades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<style>
:root{
  --cy:#22D3EE;--cy2:#06B6D4;--cy3:rgba(34,211,238,.12);--cy4:rgba(34,211,238,.06);
  --vi:#7C3AED;--vi2:#8B5CF6;--vi3:rgba(124,58,237,.15);
  --bg:#070B10;--bg2:#0D1117;
  --bc:rgba(34,211,238,.18);--bc2:rgba(255,255,255,.07);
  --t:#F0F6FF;--t2:#94A3B8;--t3:#4B5563;
  --ok:#10B981;--ok-s:rgba(16,185,129,.15);--ok-t:#34D399;
  --wn:#F59E0B;--wn-s:rgba(245,158,11,.15);
  --er:#EF4444;--er-s:rgba(239,68,68,.15);--er-t:#F87171;
  --r:8px;--rl:12px;--rxl:16px;
  --font:'Geist',system-ui,sans-serif;--mono:'Geist Mono',ui-monospace,monospace;
  --nh:54px;--sw:224px;
  --glow-cy:0 0 20px rgba(34,211,238,.25),0 0 60px rgba(34,211,238,.08);
  --glow-cy-sm:0 0 12px rgba(34,211,238,.2);
  --card-bg:rgba(255,255,255,.05);
  --card-border:rgba(255,255,255,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}button{font-family:var(--font)}

/* BG */
#bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55;animation:drift 18s ease-in-out infinite alternate}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(34,211,238,.28) 0%,transparent 70%);top:-200px;left:-150px;animation-duration:20s}
.orb2{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.32) 0%,transparent 70%);bottom:-150px;right:-100px;animation-duration:25s;animation-direction:alternate-reverse}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(34,211,238,.18) 0%,transparent 70%);top:40%;left:55%;animation-duration:30s;animation-delay:-8s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.08)}100%{transform:translate(-20px,50px) scale(.95)}}
#noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035}
#noise::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px 200px}
#grid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(34,211,238,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.03) 1px,transparent 1px);background-size:60px 60px}

/* LAYOUT */
#navbar{position:fixed;top:0;left:0;right:0;height:var(--nh);z-index:200;display:flex;align-items:center;gap:10px;padding:0 16px;
  background:rgba(7,11,16,.7);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--bc);box-shadow:0 1px 0 rgba(34,211,238,.06),inset 0 1px 0 rgba(255,255,255,.04)}
#sidebar{position:fixed;top:var(--nh);left:0;bottom:0;width:var(--sw);z-index:150;padding:16px 0 24px;overflow-y:auto;
  background:rgba(7,11,16,.8);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
  border-right:1px solid rgba(34,211,238,.1);transition:transform .25s ease}
#sb-overlay{display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
#app{position:relative;z-index:2;margin-left:var(--sw);margin-top:var(--nh);min-height:calc(100vh - var(--nh));padding:28px 32px}

/* NAVBAR */
.nb-brand{display:flex;align-items:center;gap:7px;margin-right:6px;white-space:nowrap;cursor:pointer;user-select:none}
.nb-brand:hover .nb-logo{opacity:.85}
.nb-logo{font-size:15px;font-weight:700;letter-spacing:-.4px;color:var(--t);text-shadow:0 0 18px rgba(34,211,238,.7),0 0 40px rgba(34,211,238,.3);animation:logoGlow 3s ease-in-out infinite}
.nb-logo span{color:var(--cy)}
@keyframes logoGlow{0%,100%{text-shadow:0 0 18px rgba(34,211,238,.7),0 0 40px rgba(34,211,238,.3)}50%{text-shadow:0 0 28px rgba(34,211,238,1),0 0 60px rgba(34,211,238,.5),0 0 100px rgba(34,211,238,.2)}}
.nb-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--cy3),var(--vi3));border:1px solid var(--bc);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow-cy-sm)}
.nb-icon svg{width:14px;height:14px;color:var(--cy)}
.nb-hamburger{display:none;width:34px;height:34px;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);cursor:pointer;color:var(--t2);flex-shrink:0}
.nb-hamburger svg{width:18px;height:18px}
.nb-hamburger:hover{background:rgba(255,255,255,.09);color:var(--t)}
.sw{position:relative;flex:1;max-width:380px}
.sw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3);pointer-events:none}
#gs{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:7px 14px 7px 36px;color:var(--t);font-family:var(--font);font-size:13px;outline:none;transition:all .2s}
#gs::placeholder{color:var(--t3)}
#gs:focus{border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.04);box-shadow:0 0 0 3px rgba(34,211,238,.08)}
#sr{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(13,17,23,.97);border:1px solid var(--bc);border-radius:var(--rl);box-shadow:var(--glow-cy),0 20px 40px rgba(0,0,0,.5);backdrop-filter:blur(20px);max-height:320px;overflow-y:auto;z-index:300;display:none}
#sr.on{display:block}
.sr-group{padding:8px 14px 3px;font-size:10px;font-weight:600;color:var(--cy2);text-transform:uppercase;letter-spacing:.1em}
.sr-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t2);transition:all .1s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--cy4);color:var(--t)}
.sr-item small{font-size:11px;color:var(--t3)}
.nb-acts{display:flex;gap:7px;margin-left:auto}
.bn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--t2);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:500;transition:all .18s;display:flex;align-items:center;gap:5px;font-family:var(--font);white-space:nowrap}
.bn svg{width:13px;height:13px}
.bn:hover{background:rgba(255,255,255,.1);color:var(--t)}
.bn.prim{background:linear-gradient(135deg,rgba(34,211,238,.2),rgba(124,58,237,.2));border:1px solid var(--bc);color:var(--cy);font-weight:600}
.bn.prim:hover{background:linear-gradient(135deg,rgba(34,211,238,.3),rgba(124,58,237,.3));box-shadow:var(--glow-cy-sm)}

/* SIDEBAR */
.sb-badge{margin:0 12px 16px;padding:12px 14px;background:linear-gradient(135deg,rgba(34,211,238,.08),rgba(124,58,237,.08));border:1px solid var(--bc);border-radius:var(--rl);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sb-badge:hover{border-color:rgba(34,211,238,.4);box-shadow:var(--glow-cy-sm)}
.sb-cn{font-size:11px;font-weight:700;color:var(--cy);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
.sb-cl{font-size:12px;color:var(--t2)}
.sb-bar{margin-top:9px;height:3px;background:rgba(255,255,255,.08);border-radius:2px}
.sb-bar-f{height:100%;background:linear-gradient(90deg,var(--cy),var(--vi2));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px rgba(34,211,238,.5)}
.sb-sec{padding:0 16px;margin:16px 0 5px;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--t3);font-size:13px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-item:hover{color:var(--t2);background:rgba(255,255,255,.03)}
.sb-item.active{color:var(--cy);background:rgba(34,211,238,.06);border-left-color:var(--cy);font-weight:500}
.sb-item.active svg{filter:drop-shadow(0 0 4px rgba(34,211,238,.6))}
.sb-hr{margin:10px 14px;border:none;border-top:1px solid rgba(255,255,255,.05)}
.sb-stats{margin:6px 12px 0;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:var(--r);border:1px solid rgba(255,255,255,.06)}
.sb-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sb-stat:last-child{margin:0}
.sb-sl{font-size:11px;color:var(--t3)}
.sb-sv{font-size:11px;font-weight:600;color:var(--t2)}

/* VIEWS */
.view{display:none}.view.on{display:block}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.pt{font-size:22px;font-weight:700;letter-spacing:-.5px}
.ps{font-size:13px;color:var(--t3);margin-top:4px}
.sec{margin-bottom:30px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.st{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.06em;text-transform:uppercase}
.sa{font-size:12px;color:var(--cy);cursor:pointer;background:none;border:none;font-family:var(--font);font-weight:500;transition:opacity .15s}
.sa:hover{opacity:.75}

/* METRIC CARDS */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:28px}
.mc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);padding:18px 20px;transition:all .25s;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,.35),transparent);opacity:0;transition:opacity .25s}
.mc:hover{border-color:rgba(34,211,238,.28);box-shadow:0 0 30px rgba(34,211,238,.07),0 8px 32px rgba(0,0,0,.35);transform:translateY(-1px)}
.mc:hover::before{opacity:1}
.ml{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.mv{font-size:28px;font-weight:700;letter-spacing:-.8px}
.mv.ac{color:var(--cy);text-shadow:0 0 20px rgba(34,211,238,.4)}
.mv.ok{color:var(--ok-t);text-shadow:0 0 20px rgba(16,185,129,.3)}
.mv.wn{color:var(--wn)}.mv.er{color:var(--er-t)}
.ms{font-size:11px;color:var(--t3);margin-top:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn svg{width:13px;height:13px}
.bp{background:linear-gradient(135deg,rgba(34,211,238,.2),rgba(124,58,237,.2));border:1px solid var(--bc);color:var(--cy)}
.bp:hover{background:linear-gradient(135deg,rgba(34,211,238,.3),rgba(124,58,237,.3));box-shadow:var(--glow-cy-sm)}
.bs{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid rgba(255,255,255,.12)}
.bs:hover{background:rgba(255,255,255,.09);color:var(--t)}
.bd{background:var(--er-s);color:var(--er-t);border:1px solid rgba(239,68,68,.3)}
.bd:hover{box-shadow:0 0 12px rgba(239,68,68,.3)}
.bi{width:28px;height:28px;border-radius:6px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s}
.bi:hover{background:rgba(255,255,255,.08);color:var(--t)}
.bi.er{color:var(--t3)}
.bi.er:hover{background:var(--er-s);color:var(--er-t)}
.bi svg{width:14px;height:14px}

/* ACTIVITY ROW */
.ar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);margin-bottom:8px;overflow:hidden;transition:all .2s;position:relative}
.ar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--cy),var(--vi2));opacity:0;transition:opacity .2s}
.ar:hover{border-color:rgba(34,211,238,.22);box-shadow:0 0 20px rgba(34,211,238,.07)}
.ar:hover::before,.ar.open::before{opacity:1}
.ar.open{border-color:rgba(34,211,238,.22)}
.ah{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.ai{width:18px;height:18px;flex-shrink:0;color:var(--t3);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.ar.open .ai{transform:rotate(90deg)}
.at{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t)}
.ad{font-size:11px;color:var(--cy2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.15);padding:2px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap}
.ad:hover{border-color:rgba(34,211,238,.4);color:var(--cy)}
.ahrs{font-size:12px;color:var(--t3);white-space:nowrap;text-align:right;min-width:72px}
.apb{width:72px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;flex-shrink:0}
.apf{height:100%;border-radius:2px;transition:width .4s}
.apf.hi{background:linear-gradient(90deg,var(--ok),#34D399);box-shadow:0 0 6px rgba(16,185,129,.5)}
.apf.md{background:linear-gradient(90deg,var(--cy),var(--vi2));box-shadow:0 0 6px rgba(34,211,238,.4)}
.apf.lo{background:var(--wn)}.apf.nl{background:var(--er)}
.ap{font-size:11px;font-weight:700;width:32px;text-align:right;color:var(--t3)}
.aacts{display:flex;gap:2px;margin-left:4px}
.tag-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;border:1px solid transparent}

/* SUBTASKS */
.sc{border-top:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.25)}
.si{display:flex;align-items:center;gap:9px;padding:9px 16px 9px 38px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s}
.si:last-child{border-bottom:none}
.si:hover{background:rgba(34,211,238,.03)}
.ck{width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;background:transparent}
.ck.done{background:linear-gradient(135deg,var(--ok),#059669);border-color:transparent;box-shadow:0 0 8px rgba(16,185,129,.4)}
.ck.done::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.stit{font-size:12px;flex:1;color:var(--t2)}.stit.done{color:var(--t3);text-decoration:line-through}
.slc{font-size:11px;color:var(--t3);white-space:nowrap}
.slb{font-size:11px;color:var(--cy);background:none;border:1px solid rgba(34,211,238,.2);cursor:pointer;font-family:var(--font);font-weight:500;padding:3px 9px;border-radius:5px;transition:all .15s;white-space:nowrap}
.slb:hover{background:var(--cy3);border-color:var(--cy)}
.sub-add-row{padding:8px 16px 8px 38px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,.05)}
.sub-add-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:7px;padding:6px 11px;font-family:var(--font);font-size:12px;color:var(--t);outline:none}
.sub-add-inp:focus{border-color:rgba(34,211,238,.4);background:rgba(34,211,238,.04)}
.sub-add-inp::placeholder{color:var(--t3)}

/* FILTERS */
.fb{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.fl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.fs{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:7px;padding:5px 9px;font-family:var(--font);font-size:12px;color:var(--t);outline:none;cursor:pointer;max-width:170px}
.fs:focus{border-color:rgba(34,211,238,.4)}
.fi{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:7px;padding:5px 9px;font-family:var(--font);font-size:12px;color:var(--t);outline:none;width:132px}
.fi:focus{border-color:rgba(34,211,238,.4)}
.fi::-webkit-calendar-picker-indicator{filter:invert(.5)}
.fc{padding:5px 11px;background:none;border:1px solid rgba(255,255,255,.09);border-radius:7px;color:var(--t3);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
.fc:hover{border-color:rgba(239,68,68,.4);color:var(--er-t);background:var(--er-s)}
.tag-filter-btn{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:rgba(255,255,255,.04);color:var(--t3)}
.tag-filter-btn:hover{opacity:.8}
.tag-filter-btn.active{border-color:currentColor;opacity:1}
select option{background:#12161E;color:var(--t)}

/* TIMELINE */
.td{margin-bottom:8px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);overflow:hidden;transition:all .2s}
.td:hover{border-color:rgba(34,211,238,.18)}
.td.open{border-color:rgba(34,211,238,.22)}
.tdh{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .12s;user-select:none}
.tdh:hover{background:rgba(34,211,238,.03)}
.tdate{font-size:13px;font-weight:600;min-width:110px}
.tdate.tod{color:var(--cy);text-shadow:0 0 12px rgba(34,211,238,.4)}
.tmeta{font-size:12px;color:var(--t3);flex:1}
.tex{color:var(--t3);transition:transform .2s}
.td.open .tex{transform:rotate(180deg)}
.tdc{border-top:1px solid rgba(255,255,255,.05)}
.tli{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);position:relative}
.tli::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--cy),var(--vi2));opacity:.6}
.tli:last-child{border-bottom:none}
.tlh{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.tlsub{font-size:12px;font-weight:600}
.tlact{font-size:11px;color:var(--t3)}
.tlt{font-size:12px;color:var(--t2);line-height:1.6;margin-top:4px}
.tla{display:flex;gap:4px;margin-top:9px}
.day-quick{padding:5px 12px;background:var(--cy4);border:1px solid rgba(34,211,238,.2);color:var(--cy);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.day-quick svg{width:12px;height:12px}
.day-quick:hover{background:var(--cy3);border-color:var(--cy)}
.hr-badge{font-size:11px;padding:2px 7px;background:rgba(34,211,238,.1);color:var(--cy);border-radius:4px;font-weight:500;white-space:nowrap;border:1px solid rgba(34,211,238,.18);font-family:var(--mono)}

/* CYCLE CARDS */
.ccg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rxl);padding:20px 22px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
.cc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,211,238,.3),transparent);opacity:0;transition:opacity .25s}
.cc:hover{border-color:rgba(34,211,238,.28);box-shadow:0 0 30px rgba(34,211,238,.08),0 12px 40px rgba(0,0,0,.3);transform:translateY(-2px)}
.cc:hover::after,.cc.cur::after{opacity:1}
.cc.cur{border-color:rgba(34,211,238,.32);box-shadow:0 0 20px rgba(34,211,238,.09)}
.ccn{font-size:10px;font-weight:700;color:var(--cy);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.ccname{font-size:17px;font-weight:700;margin-bottom:3px}
.ccd{font-size:12px;color:var(--t3);margin-bottom:16px}
.ccst{display:flex;gap:20px;margin-bottom:14px}
.ccsv{font-size:20px;font-weight:700}.ccsl{font-size:11px;color:var(--t3)}
.ccpb{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:12px}
.ccpf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--vi2));box-shadow:0 0 6px rgba(34,211,238,.4);transition:width .5s}
.cc-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500}
.cc-badge.cur{background:rgba(34,211,238,.12);color:var(--cy);border:1px solid rgba(34,211,238,.28)}
.cc-badge.done{background:var(--ok-s);color:var(--ok-t);border:1px solid rgba(16,185,129,.28)}
.cc-badge.fut{background:rgba(255,255,255,.04);color:var(--t3);border:1px solid rgba(255,255,255,.09)}

/* REPORTS */
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.chc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);padding:18px 20px;transition:all .2s}
.chc:hover{border-color:rgba(34,211,238,.18)}
.cht{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em}
.chw{position:relative;height:210px}
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th{padding:9px 12px;text-align:left;font-weight:600;color:var(--t3);border-bottom:1px solid rgba(255,255,255,.07);font-size:10px;text-transform:uppercase;letter-spacing:.07em}
.rtbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2)}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tr:hover td{background:rgba(34,211,238,.03);color:var(--t)}
.rtbl .prog-cell{display:flex;align-items:center;gap:8px}
.rtbl .prog-bar{width:64px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.rtbl .prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--vi2))}
.rf{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--rl);padding:18px 20px;overflow-x:auto}

/* TAGS */
.tc{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.tgc{display:flex;align-items:center;gap:9px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--r);padding:9px 14px;transition:all .2s}
.tgc:hover{border-color:rgba(34,211,238,.22);box-shadow:0 0 12px rgba(34,211,238,.06)}
.tgdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tgnm{font-size:13px;font-weight:500}
.tgct{font-size:11px;color:var(--t3)}

/* ACTIVITY DETAIL MODAL */
.ad-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.07)}
.ad-title{font-size:16px;font-weight:700;flex:1;line-height:1.3}
.ad-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ad-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}
.ad-meta-item strong{color:var(--t2);font-weight:600}
.ad-sub-section{margin-top:16px}
.ad-sub-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ad-sub-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;background:rgba(0,0,0,.2);cursor:pointer;transition:all .15s}
.ad-sub-item:hover{background:rgba(34,211,238,.04);border-color:rgba(34,211,238,.18)}
.ad-sub-item .ck{flex-shrink:0}
.ad-sub-name{font-size:12px;font-weight:500;flex:1}
.ad-sub-name.done{text-decoration:line-through;color:var(--t3)}
.ad-log-day{margin-top:10px}
.ad-log-date{font-size:11px;font-weight:600;color:var(--cy);padding:6px 0 4px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:6px}
.ad-log-entry{padding:8px 12px;border-radius:var(--r);background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.05);margin-bottom:5px;position:relative;overflow:hidden}
.ad-log-entry::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--cy),var(--vi2));opacity:.5}
.ad-log-sub{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px}
.ad-log-desc{font-size:12px;color:var(--t2);line-height:1.55}
.ad-log-hrs{float:right;font-size:11px;font-family:var(--mono);color:var(--cy);background:rgba(34,211,238,.1);padding:1px 7px;border-radius:4px;border:1px solid rgba(34,211,238,.18)}
.ad-empty{font-size:12px;color:var(--t3);padding:10px 0;font-style:italic}

/* MODAL */
#mo{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
#mo.on{display:flex}
.modal{background:rgba(11,15,22,.97);border:1px solid var(--bc);border-radius:var(--rxl);box-shadow:var(--glow-cy),0 30px 80px rgba(0,0,0,.6);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;backdrop-filter:blur(30px)}
.modal.wide{max-width:680px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.07)}
.mti{font-size:14px;font-weight:600}
.mb{padding:20px}
.mf{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:flex-end;gap:9px}

/* CONFIRM MODAL */
#confirm-mo{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px}
#confirm-mo.on{display:flex}
.confirm-box{background:rgba(11,15,22,.98);border:1px solid rgba(239,68,68,.3);border-radius:var(--rxl);box-shadow:0 0 30px rgba(239,68,68,.1),0 20px 60px rgba(0,0,0,.6);width:100%;max-width:380px;padding:24px}
.confirm-title{font-size:14px;font-weight:600;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}

/* FORMS */
.fg{margin-bottom:16px}
.fl2{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.fin{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:var(--r);padding:9px 12px;font-family:var(--font);font-size:13px;color:var(--t);outline:none;transition:all .18s}
.fin:focus{border-color:rgba(34,211,238,.45);background:rgba(34,211,238,.04);box-shadow:0 0 0 3px rgba(34,211,238,.08)}
.fin::placeholder{color:var(--t3)}
textarea.fin{resize:vertical;min-height:85px;line-height:1.55}
select.fin{cursor:pointer}
.frow{display:flex;gap:12px}.frow .fg{flex:1}
.sug{margin-top:7px;padding:8px 12px;background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.22);border-radius:7px;font-size:12px;color:var(--cy);display:none}
.sug.on{display:block}
.sug a{color:var(--cy);font-weight:600}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px}
.csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.csw:hover{transform:scale(1.2)}
.csw.sel{border-color:rgba(255,255,255,.8);transform:scale(1.15)}
.tag-sel{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.tsel{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid currentColor;transition:all .15s;opacity:.45}
.tsel:hover{opacity:.7}
.tsel.sel{opacity:1;box-shadow:0 0 8px currentColor}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge.ok{background:var(--ok-s);color:var(--ok-t)}.badge.wn{background:var(--wn-s);color:var(--wn)}
.badge.er{background:var(--er-s);color:var(--er-t)}.badge.ac{background:var(--cy3);color:var(--cy)}
.badge.nt{background:rgba(255,255,255,.07);color:var(--t3)}

/* TOAST */
#tc{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:700}
.toast{background:rgba(11,15,22,.97);border:1px solid var(--bc);color:var(--t);padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;animation:slideIn .2s ease;backdrop-filter:blur(20px);box-shadow:var(--glow-cy-sm),0 8px 24px rgba(0,0,0,.4);max-width:290px}
.toast.ok{border-color:rgba(16,185,129,.45);color:var(--ok-t);box-shadow:0 0 12px rgba(16,185,129,.2)}
.toast.er{border-color:rgba(239,68,68,.45);color:var(--er-t);box-shadow:0 0 12px rgba(239,68,68,.2)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty svg{width:38px;height:38px;margin:0 auto 12px;display:block;opacity:.35}
.empty h3{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty p{font-size:12px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(34,211,238,.3)}

@media(max-width:768px){
  :root{--sw:0px}
  #sidebar{transform:translateX(-224px);width:224px}
  #sidebar.mob-open{transform:translateX(0)}
  #sb-overlay.on{display:block}
  #app{margin-left:0;padding:16px}
  .mg{grid-template-columns:repeat(2,1fr)}
  .nb-hamburger{display:flex}
  .nb-acts .bn:not(.prim){display:none}
}
</style>
</head>

<script>
'use strict';
const SK='workdash_v1';
const CYCLE_DEFS=[
  {id:'c1',n:1,name:'Ciclo 1',label:'Janeiro ~ Fevereiro',sm:1,em:2},
  {id:'c2',n:2,name:'Ciclo 2',label:'Março ~ Abril',sm:3,em:4},
  {id:'c3',n:3,name:'Ciclo 3',label:'Maio ~ Junho',sm:5,em:6},
  {id:'c4',n:4,name:'Ciclo 4',label:'Julho ~ Agosto',sm:7,em:8},
  {id:'c5',n:5,name:'Ciclo 5',label:'Setembro ~ Outubro',sm:9,em:10},
  {id:'c6',n:6,name:'Ciclo 6',label:'Novembro ~ Dezembro',sm:11,em:12},
];
const TAG_COLORS=['#22D3EE','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16'];
const MONTHS_PT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MONTHS_FULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
// Palette for charts per activity (repeats if >12)
const ACT_PALETTE=['#22D3EE','#8B5CF6','#10B981','#F59E0B','#EF4444','#EC4899','#14B8A6','#F97316','#6366F1','#84CC16','#60A5FA','#A78BFA'];

let S={
  activities:[],subtasks:[],logs:[],tags:[],
  currentView:'dashboard',
  filterCycleId:'',filterActivityId:'',filterSubtaskId:'',filterTagId:'',filterStatus:'',
  filterDateFrom:'',filterDateTo:'',filterYear:String(new Date().getFullYear()),
  openActivities:new Set(),openDays:new Set(),
};

// ── STORAGE ──
function load(){try{const d=JSON.parse(localStorage.getItem(SK)||'{}');S.activities=d.activities||[];S.subtasks=d.subtasks||[];S.logs=d.logs||[];S.tags=d.tags||[];S.openActivities=new Set();S.openDays=new Set();}catch(e){S.activities=[];S.subtasks=[];S.logs=[];S.tags=[];}}
function save(){try{localStorage.setItem(SK,JSON.stringify({activities:S.activities,subtasks:S.subtasks,logs:S.logs,tags:S.tags}));}catch(e){toast('Erro ao salvar','er');}}

// ── UTILS ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function getCurrentCycle(){const m=new Date().getMonth()+1;return CYCLE_DEFS.find(c=>m>=c.sm&&m<=c.em)||CYCLE_DEFS[0];}
function getCycleById(id){return CYCLE_DEFS.find(c=>c.id===id);}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');const today=todayStr();if(s===today)return'Hoje';const yest=new Date();yest.setDate(yest.getDate()-1);if(s===yest.toISOString().slice(0,10))return'Ontem';return`${d} ${MONTHS_PT[parseInt(m)-1]} ${y}`;}
function actById(id){return S.activities.find(a=>a.id===id);}
function subById(id){return S.subtasks.find(s=>s.id===id);}
function logById(id){return S.logs.find(l=>l.id===id);}
function tagById(id){return S.tags.find(t=>t.id===id);}
function getActSubtasks(actId){return S.subtasks.filter(s=>s.activityId===actId);}
function getSubLogs(subId){return S.logs.filter(l=>l.subtaskId===subId);}
function getActCompletion(actId){const subs=getActSubtasks(actId);if(!subs.length)return 0;return Math.round(subs.filter(s=>s.done).length/subs.length*100);}
function getActHoursSpent(actId){const ids=getActSubtasks(actId).map(s=>s.id);return S.logs.filter(l=>ids.includes(l.subtaskId)).reduce((sum,l)=>sum+(l.hrs||0),0);}
function getSubHoursSpent(subId){return getSubLogs(subId).reduce((sum,l)=>sum+(l.hrs||0),0);}
function getCycleActivities(cycleId,year){return S.activities.filter(a=>a.cycleId===cycleId&&String(a.year)===String(year));}
function pctClass(p){return p>=75?'hi':p>=40?'md':p>=15?'lo':'nl';}
function hrsDisplay(h){return h===0?'0h':h%1===0?`${h}h`:`${h.toFixed(1)}h`;}
function renderTagBadges(tagIds=[]){return (tagIds||[]).map(id=>{const t=tagById(id);if(!t)return'';return`<span class="tag-chip" style="background:${t.color}18;color:${t.color};border-color:${t.color}45">${esc(t.name)}</span>`;}).join('');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── CRUD ──
function addActivity(d){S.activities.push({id:uid(),createdAt:new Date().toISOString(),...d});save();rebuildSearch();}
function updActivity(id,d){const i=S.activities.findIndex(a=>a.id===id);if(i>-1){S.activities[i]={...S.activities[i],...d};save();rebuildSearch();}}
function delActivity(id){const subs=getActSubtasks(id).map(s=>s.id);S.subtasks=S.subtasks.filter(s=>s.activityId!==id);S.logs=S.logs.filter(l=>!subs.includes(l.subtaskId));S.activities=S.activities.filter(a=>a.id!==id);save();rebuildSearch();}
function addSubtask(d){S.subtasks.push({id:uid(),done:false,createdAt:new Date().toISOString(),...d});save();rebuildSearch();}
function updSubtask(id,d){const i=S.subtasks.findIndex(s=>s.id===id);if(i>-1){S.subtasks[i]={...S.subtasks[i],...d};save();rebuildSearch();}}
function delSubtask(id){S.logs=S.logs.filter(l=>l.subtaskId!==id);S.subtasks=S.subtasks.filter(s=>s.id!==id);save();rebuildSearch();}
function addLog(d){S.logs.push({id:uid(),createdAt:new Date().toISOString(),...d});save();}
function updLog(id,d){const i=S.logs.findIndex(l=>l.id===id);if(i>-1){S.logs[i]={...S.logs[i],...d};save();}}
function delLog(id){S.logs=S.logs.filter(l=>l.id!==id);save();}
function addTag(d){S.tags.push({id:uid(),...d});save();}
function updTag(id,d){const i=S.tags.findIndex(t=>t.id===id);if(i>-1){S.tags[i]={...S.tags[i],...d};save();}}
function delTag(id){const rm=arr=>arr.map(x=>({...x,tags:(x.tags||[]).filter(t=>t!==id)}));S.activities=rm(S.activities);S.subtasks=rm(S.subtasks);S.tags=S.tags.filter(t=>t.id!==id);save();}

// ── FUSE ──
let fuseAll=null,fuseActs=null;
function rebuildSearch(){
  const all=[
    ...S.activities.map(a=>({...a,_type:'atividade',_text:a.title,_sub:getCycleById(a.cycleId)?.name})),
    ...S.subtasks.map(s=>{const a=actById(s.activityId);return{...s,_type:'subtarefa',_text:s.title,_sub:a?.title||''};}),
    ...S.logs.map(l=>{const s=subById(l.subtaskId);return{...l,_type:'registro',_text:l.description,_sub:s?.title||'',_date:l.date};}),
    ...S.tags.map(t=>({...t,_type:'tag',_text:t.name,_sub:''})),
  ];
  fuseAll=new Fuse(all,{keys:['_text'],threshold:0.4,includeMatches:true,minMatchCharLength:2});
  fuseActs=new Fuse(S.activities,{keys:['title'],threshold:0.45});
}
function suggestActivity(title){if(!fuseActs||!title.trim())return null;const r=fuseActs.search(title);return r.length?r[0].item:null;}

// ── TOAST ──
function toast(msg,type=''){const el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;document.getElementById('tc').appendChild(el);setTimeout(()=>el.remove(),3200);}

// ── CONFIRM MODAL ──
let _confirmCb=null;
function confirmAction(msg,cb,title='Confirmar exclusão'){
  document.getElementById('cm-title').textContent=title;
  document.getElementById('cm-msg').textContent=msg;
  _confirmCb=cb;
  document.getElementById('confirm-mo').classList.add('on');
}
function closeConfirm(){document.getElementById('confirm-mo').classList.remove('on');_confirmCb=null;}
document.getElementById('cm-ok').addEventListener('click',()=>{if(_confirmCb)_confirmCb();closeConfirm();});

// ── MOBILE SIDEBAR ──
function toggleMobileSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sb-overlay');
  sb.classList.toggle('mob-open');
  ov.classList.toggle('on');
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sb-overlay').classList.remove('on');
}

// ── NAVIGATION ──
function navigate(view){
  S.currentView=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.sb-item').forEach(i=>{i.classList.remove('active');if(i.dataset.view===view)i.classList.add('active');});
  document.getElementById('view-'+view).classList.add('on');
  updateSidebar();renderView(view);
  closeMobileSidebar();
}
function renderView(v){destroyCharts();if(v==='dashboard')renderDashboard();else if(v==='cycles')renderCycles();else if(v==='activities')renderActivities();else if(v==='timeline')renderTimeline();else if(v==='reports')renderReports();else if(v==='tags')renderTags();}

// ── SIDEBAR ──
function updateSidebar(){
  const cc=getCurrentCycle();const year=new Date().getFullYear();
  const acts=getCycleActivities(cc.id,year);
  const totalEst=acts.reduce((s,a)=>s+(a.estimatedHours||0),0);
  const totalSpent=acts.reduce((s,a)=>s+getActHoursSpent(a.id),0);
  const avgComp=acts.length?Math.round(acts.reduce((s,a)=>s+getActCompletion(a.id),0)/acts.length):0;
  const pct=totalEst?Math.round(totalSpent/totalEst*100):avgComp;
  document.getElementById('sb-cn').textContent=cc.name;
  document.getElementById('sb-cl').textContent=cc.label+' '+year;
  document.getElementById('sb-bar-f').style.width=Math.min(pct,100)+'%';
  document.getElementById('ss-h').textContent=hrsDisplay(totalSpent);
  document.getElementById('ss-e').textContent=hrsDisplay(totalEst);
  document.getElementById('ss-c').textContent=avgComp+'%';
  document.getElementById('ss-a').textContent=acts.length+' ativ.';
}

// ── DASHBOARD ──

  const cc=getCurrentCycle();const year=new Date().getFullYear();
  const acts=getCycleActivities(cc.id,year);
  const totalEst=acts.reduce((s,a)=>s+(a.estimatedHours||0),0);
  const totalSpent=acts.reduce((s,a)=>s+getActHoursSpent(a.id),0);
  const avgComp=acts.length?Math.round(acts.reduce((s,a)=>s+getActCompletion(a.id),0)/acts.length):0;
  const active=acts.filter(a=>getActCompletion(a.id)<100).length;
  const since=new Date();since.setDate(since.getDate()-6);
  const sinceStr=since.toISOString().slice(0,10);

  }).join('')||'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>Nenhuma atividade neste ciclo</h3><p>Adicione atividades com "+ Nova Atividade"</p></div>';
  const timelineHtml=Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).slice(0,5).map(date=>{
    const dayLogs=byDate[date];const totalHrs=dayLogs.reduce((s,l)=>s+(l.hrs||0),0);const subs=new Set(dayLogs.map(l=>l.subtaskId)).size;const isOpen=S.openDays.has('dash-'+date);
    const logsHtml=dayLogs.map(l=>{const sub=subById(l.subtaskId),act=sub?actById(sub.activityId):null;return`<div class="tli"><div class="tlh"><span class="tlsub">${esc(sub?.title||'—')}</span><span class="tlact">/ ${esc(act?.title||'—')}</span>${l.hrs?`<span class="hr-badge" style="margin-left:auto">${hrsDisplay(l.hrs)}</span>`:''}</div><div class="tlt">${esc(l.description)}</div></div>`;}).join('');
    return`<div class="td ${isOpen?'open':''}" id="dd-${date}"><div class="tdh" onclick="toggleDay('dash-${date}','dd-${date}')"><div class="tdate ${date===todayStr()?'tod':''}">${fmtDate(date)}</div><div class="tmeta">${subs} subtarefa${subs!==1?'s':''} · ${hrsDisplay(totalHrs)}</div><svg class="tex" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>${isOpen?`<div class="tdc">${logsHtml}</div>`:''}</div>`;
  }).join('')||'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><h3>Nenhum registro nos últimos 7 dias</h3><p>Registre seu progresso diário nas atividades</p></div>';
  document.getElementById('view-dashboard').innerHTML=`
    <div class="ph"><div><div class="pt">Dashboard</div><div class="ps">${cc.name} — ${cc.label} ${year}</div></div>
      <button class="btn bp" onclick="openAddLogModal(null,null)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Registrar hoje</button></div>
    <div class="mg">
      <div class="mc"><div class="ml">Horas gastas</div><div class="mv ac">${hrsDisplay(totalSpent)}</div><div class="ms">de ${hrsDisplay(totalEst)} estimadas</div></div>
      <div class="mc"><div class="ml">Conclusão média</div><div class="mv ${avgComp>=75?'ok':avgComp>=40?'ac':'wn'}">${avgComp}%</div><div class="ms">${acts.length} atividade${acts.length!==1?'s':''} no ciclo</div></div>
      <div class="mc"><div class="ml">Em andamento</div><div class="mv">${active}</div><div class="ms">atividade${active!==1?'s':''} abertas</div></div>
      <div class="mc"><div class="ml">Registros hoje</div><div class="mv">${S.logs.filter(l=>l.date===todayStr()).length}</div><div class="ms">${hrsDisplay(S.logs.filter(l=>l.date===todayStr()).reduce((s,l)=>s+(l.hrs||0),0))} registradas</div></div>
    </div>
    <div class="sec"><div class="sh"><span class="st">Progresso das atividades</span><button class="sa" onclick="navigate('activities')">Ver todas →</button></div>${progRows}</div>
    <div class="sec"><div class="sh"><span class="st">Registros recentes</span><button class="sa" onclick="navigate('timeline')">Ver timeline →</button></div>${timelineHtml}</div>`;

// ── CYCLES ──
function renderCycles(){
  const year=parseInt(S.filterYear||new Date().getFullYear());const cc=getCurrentCycle();const curMonth=new Date().getMonth()+1;const curYear=new Date().getFullYear();
  const cards=CYCLE_DEFS.map(cd=>{const acts=getCycleActivities(cd.id,year);const totalEst=acts.reduce((s,a)=>s+(a.estimatedHours||0),0);const totalSpent=acts.reduce((s,a)=>s+getActHoursSpent(a.id),0);const avgComp=acts.length?Math.round(acts.reduce((s,a)=>s+getActCompletion(a.id),0)/acts.length):0;const isCur=cd.id===cc.id&&year===curYear;const isDone=year<curYear||(year===curYear&&cd.em<curMonth);const badgeClass=isCur?'cur':isDone?'done':'fut';const badgeText=isCur?'Ciclo atual':isDone?'Concluído':'Futuro';const pct=totalEst?Math.round(totalSpent/totalEst*100):avgComp;
    return`<div class="cc ${isCur?'cur':''}" onclick="filterCycleActs('${cd.id}','${year}')"><div class="ccn">Nº ${cd.n}</div><div class="ccname">${esc(cd.name)}</div><div class="ccd">${esc(cd.label)} ${year}</div><div class="ccst"><div class="ccs"><div class="ccsv">${acts.length}</div><div class="ccsl">Atividades</div></div><div class="ccs"><div class="ccsv">${hrsDisplay(totalSpent)}</div><div class="ccsl">Gastas</div></div><div class="ccs"><div class="ccsv">${hrsDisplay(totalEst)}</div><div class="ccsl">Estimadas</div></div></div><div class="ccpb"><div class="ccpf" style="width:${Math.min(pct,100)}%"></div></div><span class="cc-badge ${badgeClass}">${badgeText} · ${avgComp}% concluído</span></div>`;
  }).join('');
  document.getElementById('view-cycles').innerHTML=`<div class="ph"><div><div class="pt">Ciclos</div><div class="ps">Visão geral de todos os ciclos do ano</div></div><div style="display:flex;gap:8px;align-items:center"><label style="font-size:12px;color:var(--t3)">Ano:</label><select class="fs" onchange="S.filterYear=this.value;renderCycles()" style="width:80px">${[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select><button class="btn bp" onclick="openAddActivityModal(null)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova atividade</button></div></div><div class="ccg">${cards}</div>`;
}
function filterCycleActs(cycleId,year){S.filterCycleId=cycleId;S.filterYear=String(year);navigate('activities');}

// ── ACTIVITIES ──
function renderActivities(){
  const year=parseInt(S.filterYear||new Date().getFullYear());
  let acts=S.activities.filter(a=>String(a.year)===String(year));
  if(S.filterCycleId) acts=acts.filter(a=>a.cycleId===S.filterCycleId);
  if(S.filterStatus==='active') acts=acts.filter(a=>getActCompletion(a.id)<100);
  else if(S.filterStatus==='done') acts=acts.filter(a=>getActCompletion(a.id)===100);
  if(S.filterTagId) acts=acts.filter(a=>(a.tags||[]).includes(S.filterTagId));
  const cycleOpts=CYCLE_DEFS.map(cd=>`<option value="${cd.id}" ${S.filterCycleId===cd.id?'selected':''}>${esc(cd.name)}</option>`).join('');
  const yearOpts=[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('');
  const tagFilterBtns=S.tags.map(t=>`<button class="tag-filter-btn ${S.filterTagId===t.id?'active':''}" style="background:${t.color}18;color:${t.color};border-color:${S.filterTagId===t.id?t.color:'transparent'}" onclick="S.filterTagId=S.filterTagId==='${t.id}'?'':'${t.id}';renderActivities()">${esc(t.name)}</button>`).join('');
  const rows=acts.map(a=>renderActivityRow(a)).join('')||`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg><h3>Nenhuma atividade encontrada</h3><p>Adicione uma nova atividade ou ajuste os filtros</p></div>`;
  document.getElementById('view-activities').innerHTML=`
    <div class="ph"><div><div class="pt">Atividades</div><div class="ps">${acts.length} atividade${acts.length!==1?'s':''} encontrada${acts.length!==1?'s':''}</div></div>
      <button class="btn bp" onclick="openAddActivityModal(null)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova atividade</button></div>
    <div class="fb">
      <span class="fl">Filtros</span>
      <select class="fs" onchange="S.filterCycleId=this.value;renderActivities()"><option value="">Todos os ciclos</option>${cycleOpts}</select>
      <select class="fs" onchange="S.filterYear=this.value;renderActivities()" style="width:80px">${yearOpts}</select>
      <select class="fs" onchange="S.filterStatus=this.value;renderActivities()">
        <option value="" ${!S.filterStatus?'selected':''}>Todos os status</option>
        <option value="active" ${S.filterStatus==='active'?'selected':''}>Em andamento</option>
        <option value="done" ${S.filterStatus==='done'?'selected':''}>Concluídas</option>
      </select>
      ${tagFilterBtns}
      <button class="fc" onclick="S.filterCycleId='';S.filterStatus='';S.filterTagId='';renderActivities()">Limpar</button>
    </div>
    <div id="acts-list">${rows}</div>`;
}

        <button class="bi er" onclick="confirmDeleteActivity('${a.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
    </div>
    ${subsHtml}
  </div>`;
}
function renderSubtaskRow(s){
  const logs=getSubLogs(s.id);const hrs=getSubHoursSpent(s.id);
  return`<div class="si" id="si-${s.id}">
    <div class="ck ${s.done?'done':''}" onclick="toggleSubDone('${s.id}')" title="${s.done?'Marcar pendente':'Marcar concluída'}"></div>
    <span class="stit ${s.done?'done':''}">${esc(s.title)}</span>
    ${renderTagBadges(s.tags)}
    ${hrs?`<span class="hr-badge">${hrsDisplay(hrs)}</span>`:''}

    <button class="slb" onclick="openAddLogModal('${s.id}',null)">+ Reg.</button>

// ── TIMELINE ──
function renderTimeline(){
  const year=parseInt(S.filterYear||new Date().getFullYear());
  let logs=S.logs.slice();
  if(S.filterCycleId){const actIds=S.activities.filter(a=>a.cycleId===S.filterCycleId&&String(a.year)===String(year)).map(a=>a.id);const subIds=S.subtasks.filter(s=>actIds.includes(s.activityId)).map(s=>s.id);logs=logs.filter(l=>subIds.includes(l.subtaskId));}
  if(S.filterActivityId){const subIds=S.subtasks.filter(s=>s.activityId===S.filterActivityId).map(s=>s.id);logs=logs.filter(l=>subIds.includes(l.subtaskId));}
  if(S.filterSubtaskId) logs=logs.filter(l=>l.subtaskId===S.filterSubtaskId);
  if(S.filterTagId){const subIds=S.subtasks.filter(s=>(s.tags||[]).includes(S.filterTagId)).map(s=>s.id);const actIds=S.activities.filter(a=>(a.tags||[]).includes(S.filterTagId)).map(a=>a.id);const actSubIds=S.subtasks.filter(s=>actIds.includes(s.activityId)).map(s=>s.id);const allIds=new Set([...subIds,...actSubIds]);logs=logs.filter(l=>allIds.has(l.subtaskId));}
  if(S.filterDateFrom) logs=logs.filter(l=>l.date>=S.filterDateFrom);
  if(S.filterDateTo) logs=logs.filter(l=>l.date<=S.filterDateTo);
  const byDate={};logs.forEach(l=>{byDate[l.date]=(byDate[l.date]||[]).concat(l);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const acts=S.activities.filter(a=>String(a.year)===String(year));
  const actOpts=acts.map(a=>`<option value="${a.id}" ${S.filterActivityId===a.id?'selected':''}>${esc(a.title)}</option>`).join('');
  const cycleOpts=CYCLE_DEFS.map(cd=>`<option value="${cd.id}" ${S.filterCycleId===cd.id?'selected':''}>${esc(cd.name)}</option>`).join('');
  const selAct=S.filterActivityId?acts.find(a=>a.id===S.filterActivityId):null;
  const subOpts=selAct?getActSubtasks(selAct.id).map(s=>`<option value="${s.id}" ${S.filterSubtaskId===s.id?'selected':''}>${esc(s.title)}</option>`).join(''):'';
  const tagFilterBtns=S.tags.map(t=>`<button class="tag-filter-btn ${S.filterTagId===t.id?'active':''}" style="background:${t.color}18;color:${t.color};border-color:${S.filterTagId===t.id?t.color:'transparent'}" onclick="S.filterTagId=S.filterTagId==='${t.id}'?'':'${t.id}';renderTimeline()">${esc(t.name)}</button>`).join('');
  const rows=dates.map(date=>{
    const dayLogs=byDate[date].sort((a,b)=>a.subtaskId.localeCompare(b.subtaskId));const totalHrs=dayLogs.reduce((s,l)=>s+(l.hrs||0),0);const uniqueSubs=new Set(dayLogs.map(l=>l.subtaskId)).size;const isOpen=S.openDays.has('tl-'+date);
    const logsHtml=dayLogs.map(l=>{const sub=subById(l.subtaskId);const act=sub?actById(sub.activityId):null;
      return`<div class="tli"><div class="tlh"><span class="tlsub">${esc(sub?.title||'—')}</span><span class="tlact">/ ${esc(act?.title||'—')}</span>${renderTagBadges([...(sub?.tags||[])])}${l.hrs?`<span class="hr-badge" style="margin-left:auto">${hrsDisplay(l.hrs)}</span>`:''}</div>
        <div class="tlt">${esc(l.description)}</div>
        <div class="tla"><button class="bi" onclick="openEditLogModal('${l.id}')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="bi er" onclick="confirmDeleteLog('${l.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div>
      </div>`;
    }).join('');
    return`<div class="td ${isOpen?'open':''}" id="tl-day-${date}"><div class="tdh" onclick="toggleDay('tl-${date}','tl-day-${date}')"><div class="tdate ${date===todayStr()?'tod':''}">${fmtDate(date)}</div><div class="tmeta">${uniqueSubs} sub${uniqueSubs!==1?'s':''}${totalHrs?` · ${hrsDisplay(totalHrs)}`:''}</div>
      <button class="day-quick" onclick="event.stopPropagation();openAddLogModal(null,'${date}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Registrar</button>
      <svg class="tex" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>${isOpen?`<div class="tdc">${logsHtml}</div>`:''}</div>`;
  }).join('')||`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><h3>Nenhum registro encontrado</h3><p>Ajuste os filtros ou registre suas atividades</p></div>`;
  document.getElementById('view-timeline').innerHTML=`
    <div class="ph"><div><div class="pt">Registros Diários</div><div class="ps">${dates.length} dia${dates.length!==1?'s':''} com registros</div></div>
      <button class="btn bp" onclick="openAddLogModal(null,null)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Registrar hoje</button></div>
    <div class="fb">
      <span class="fl">Filtros</span>
      <select class="fs" onchange="S.filterCycleId=this.value;S.filterActivityId='';S.filterSubtaskId='';renderTimeline()"><option value="">Todos os ciclos</option>${cycleOpts}</select>
      <select class="fs" onchange="S.filterActivityId=this.value;S.filterSubtaskId='';renderTimeline()" style="max-width:190px"><option value="">Todas as atividades</option>${actOpts}</select>
      ${selAct?`<select class="fs" onchange="S.filterSubtaskId=this.value;renderTimeline()" style="max-width:190px"><option value="">Todas as subtarefas</option>${subOpts}</select>`:''}
      <input class="fi" type="date" value="${S.filterDateFrom||''}" onchange="S.filterDateFrom=this.value;renderTimeline()">
      <input class="fi" type="date" value="${S.filterDateTo||''}" onchange="S.filterDateTo=this.value;renderTimeline()">
      <select class="fs" style="width:80px" onchange="S.filterYear=this.value;renderTimeline()">${[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select>
      ${tagFilterBtns}
      <button class="fc" onclick="S.filterCycleId='';S.filterActivityId='';S.filterSubtaskId='';S.filterTagId='';S.filterDateFrom='';S.filterDateTo='';renderTimeline()">Limpar</button>
    </div>
    <div id="tl-list">${rows}</div>`;
}
function toggleDay(stateKey,elId){
  if(S.openDays.has(stateKey))S.openDays.delete(stateKey);else S.openDays.add(stateKey);

// ── REPORTS ──
const charts={};
function destroyCharts(){Object.keys(charts).forEach(k=>{try{charts[k].destroy();}catch(e){}delete charts[k];});}
function renderReports(){
  const year=parseInt(S.filterYear||new Date().getFullYear());
  const cc=getCurrentCycle();
  // Default to current cycle if none selected
  if(!S.filterCycleId) S.filterCycleId=cc.id;
  const cycleOpts=CYCLE_DEFS.map(cd=>`<option value="${cd.id}" ${S.filterCycleId===cd.id?'selected':''}>${cd.name}</option>`).join('');
  const acts=getCycleActivities(S.filterCycleId,year);
  const tableRows=acts.map(a=>{const pct=getActCompletion(a.id);const spent=getActHoursSpent(a.id);const est=a.estimatedHours||0;
    return`<tr><td>${esc(a.title)}</td><td>${hrsDisplay(spent)}</td><td>${hrsDisplay(est)}</td><td><div class="prog-cell"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>${pct}%</div></td><td>${getActSubtasks(a.id).length}</td><td>${getActSubtasks(a.id).reduce((s,sub)=>s+getSubLogs(sub.id).length,0)}</td></tr>`;
  }).join('')||`<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:20px">Nenhuma atividade neste ciclo</td></tr>`;
  const days30=[];for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days30.push(d.toISOString().slice(0,10));}
  document.getElementById('view-reports').innerHTML=`
    <div class="ph"><div><div class="pt">Relatórios</div><div class="ps">Análise detalhada de horas e progresso</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="fs" onchange="S.filterCycleId=this.value;renderReports()">${cycleOpts}</select>
        <select class="fs" style="width:80px" onchange="S.filterYear=this.value;renderReports()">${[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}</select>
      </div></div>
    <div class="rg" style="margin-bottom:16px">
      <div class="chc"><div class="cht">Horas por atividade</div><div class="chw"><canvas id="ch-bar"></canvas></div></div>
      <div class="chc"><div class="cht">Conclusão por atividade</div><div class="chw"><canvas id="ch-doughnut"></canvas></div></div>
    </div>
    <div class="rg" style="margin-bottom:16px">
      <div class="chc" style="grid-column:1/-1"><div class="cht">Horas por atividade — últimos 30 dias</div><div class="chw" style="height:200px"><canvas id="ch-stacked"></canvas></div></div>
    </div>
    <div class="rf"><div class="cht">Detalhamento por atividade</div>
      <table class="rtbl"><thead><tr><th>Atividade</th><th>Gastas</th><th>Estimadas</th><th>Conclusão</th><th>Subtarefas</th><th>Registros</th></tr></thead>
      <tbody>${tableRows}</tbody></table>
    </div>`;
  setTimeout(()=>{
    const tc='#64748B';const gc='rgba(255,255,255,.04)';
    const baseScales={x:{ticks:{color:tc,font:{size:11,family:'Geist'}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:11,family:'Geist'}},grid:{color:gc}}};
    const baseLegend={labels:{color:'#94A3B8',font:{size:12,family:'Geist'}}};
    // Bar chart
    const bEl=document.getElementById('ch-bar');
    if(bEl&&acts.length){charts.bar=new Chart(bEl,{type:'bar',data:{labels:acts.map(a=>a.title.length>18?a.title.slice(0,18)+'…':a.title),datasets:[{label:'Horas gastas',data:acts.map(a=>+getActHoursSpent(a.id).toFixed(1)),backgroundColor:'rgba(34,211,238,.5)',borderColor:'rgba(34,211,238,.9)',borderWidth:1.5,borderRadius:5},{label:'Estimadas',data:acts.map(a=>a.estimatedHours||0),backgroundColor:'rgba(255,255,255,.04)',borderColor:'rgba(255,255,255,.12)',borderWidth:1,borderRadius:5}]},options:{scales:baseScales,responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{...baseLegend.labels}},tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${ctx.raw}h`}}}}});}
    // Doughnut
    const dEl=document.getElementById('ch-doughnut');
    if(dEl&&acts.length){charts.doughnut=new Chart(dEl,{type:'doughnut',data:{labels:acts.map(a=>a.title.length>20?a.title.slice(0,20)+'…':a.title),datasets:[{data:acts.map(a=>getActCompletion(a.id)||1),backgroundColor:ACT_PALETTE.concat(ACT_PALETTE),borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{color:'#94A3B8',font:{size:11,family:'Geist'},boxWidth:12,padding:10}},tooltip:{callbacks:{label:(ctx)=>`${ctx.label}: ${acts[ctx.dataIndex]?getActCompletion(acts[ctx.dataIndex].id):0}%`}}}}});}
    // Stacked bar — hours per activity per day (last 30 days)
    const stEl=document.getElementById('ch-stacked');
    if(stEl){
      // All activities in this cycle (use all, not just filtered)
      const allCycleActs=getCycleActivities(S.filterCycleId,year);
      // Only include activities that have logs in last 30 days
      const actsWithLogs=allCycleActs.filter(a=>{const subIds=getActSubtasks(a.id).map(s=>s.id);return days30.some(d=>S.logs.some(l=>l.date===d&&subIds.includes(l.subtaskId)));});
      const datasets=actsWithLogs.map((a,i)=>{
        const subIds=getActSubtasks(a.id).map(s=>s.id);
        const color=ACT_PALETTE[i%ACT_PALETTE.length];
        return{label:a.title.length>22?a.title.slice(0,22)+'…':a.title,data:days30.map(d=>+(S.logs.filter(l=>l.date===d&&subIds.includes(l.subtaskId)).reduce((s,l)=>s+(l.hrs||0),0)).toFixed(1)),backgroundColor:color+'BB',borderColor:color,borderWidth:0,borderRadius:3};
      });
      charts.stacked=new Chart(stEl,{type:'bar',data:{labels:days30.map(d=>{const[,m,dd]=d.split('-');return`${dd}/${m}`;}),datasets:datasets.length?datasets:[{label:'Sem dados',data:days30.map(()=>0),backgroundColor:'rgba(255,255,255,.04)'}]},options:{scales:{...baseScales,x:{...baseScales.x,ticks:{...baseScales.x.ticks,maxRotation:45,minRotation:0,autoSkip:true,maxTicksLimit:15}},y:{...baseScales.y,stacked:true,min:0,title:{display:true,text:'horas',color:tc,font:{size:10,family:'Geist'}}}},responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{...baseLegend.labels,boxWidth:10,padding:8}},tooltip:{mode:'index',intersect:false,callbacks:{label:(ctx)=>ctx.raw>0?`${ctx.dataset.label}: ${ctx.raw}h`:null}}},interaction:{mode:'index',intersect:false}}});
    }
  },80);
}
